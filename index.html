<style>
:root{
 --bg-color:#0a0a0a;
 --panel-bg:#161616;
 --p-color:#2196f3;
 --b-color:#f44336;
 --t-color:#4caf50;
 --text-color:#ffffff;
 --border-color:#333;
}

/* 🔥 BODY ตัวเดียว วางตรงนี้ */
body{
 background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
 color:var(--text-color);
 font-family:sans-serif;
 margin:0;
 padding:20px;
 display:flex;
 justify-content:center;
 position:relative;
 overflow-x:hidden;
}

/* ===== ต่อด้วย CSS อื่นทั้งหมด ===== */
.layout{
  display:flex;
  gap:20px;
  width:100%;
  max-width:100%;
  flex-wrap:wrap;   /* สำคัญมาก */
}

body::before{
 pointer-events:none; /* 🔥 กันบังคลิก */
}

/* LEFT */
.left-panel{
  width:320px;
  flex: 1 1 320px;
}

.right-panel{
  flex: 2 1 600px;
  min-width:300px;
}

.box{
 background:var(--panel-bg);
 border:1px solid var(--border-color);
 border-radius:8px;
 padding:10px;
}

.header-title{
 text-align:center;
 font-size:12px;
 color:#888;
 margin-bottom:10px;
}

.bead-scroll-area{
 height: 270px;   /* 6 × 40px = 240px พอดี */
 overflow-x:auto;
 background:#000;
 border:1px solid #333;
}

.bead-grid{
  display:grid;
  grid-auto-flow:column;
  gap:4px;
  padding:5px;
}

.bead{
  width:clamp(22px, 3vw, 40px);
  height:clamp(22px, 3vw, 40px);
  font-size:12px;
}

.b-p{background:var(--p-color)}
.b-b{background:var(--b-color)}
.b-t{background:var(--t-color);color:#000}
.b-empty{border-color:#222}

/* STATS */
.stat-row{
 display:flex;
 justify-content:space-around;
 font-weight:bold;
}

/* RIGHT */
.controls{display:flex;gap:10px;justify-content:center}

.btn{
 padding:10px 20px;
 border:none;
 border-radius:6px;
 cursor:pointer;
 color:#fff;
 font-weight:bold;
}

.btn-p{background:var(--p-color)}
.btn-b{background:var(--b-color)}
.btn-t{background:var(--t-color);color:#000}

.patterns-container{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:8px;
}

.pattern-row{
 background:#161616;
 border:1px solid #333;
 border-radius:6px;
 padding:8px;
 display:grid;
 grid-template-columns:60px 1fr 40px;
 align-items:center;
}

.pred-circle{
 width:28px;height:28px;
 border-radius:50%;
 display:flex;
 align-items:center;
 justify-content:center;
 border:2px solid #555;
}

body::before{

.trick-row{

}

@keyframes playBlink{
  0%{opacity:1; transform:scale(1);}
  50%{opacity:0.5; transform:scale(1.15);}
  100%{opacity:1; transform:scale(1);}
}

.main-title + div span{

    to{box-shadow:0 0 16px rgba(124,255,196,.7);}
}

.main-title{
    line-height:1.05;
}

</style>

<script>

  // 🔥 วันหมดอายุ

renderExpireDate();

      history = [];

  }catch(e){
    loginErrEl.innerText="❌ ไม่สามารถเชื่อมต่อ Server";

}


// 👁 ดูรหัส
function togglePass(){
 const p = document.getElementById("pass");
 p.type = (p.type==="password") ? "text":"password";
}


const PATTERNS=[
"PPPP","PPPB","PPBP","PPBB",
"PBPP","PBPB","PBBP","PBBB",
"BPPP","BPPB","BPBP","BPBB",
"BBPP","BBPB","BBBP","BBBB"
];

let history=[];
let patterns=[];

function init(){
 const box=document.getElementById("patterns-container");
 box.innerHTML="";
 patterns=[];

 PATTERNS.forEach((code,i)=>{
  const id=i+1;

  patterns.push({
   id,
   code,
   step:0,
   stats:{p:0,b:0,t:0,total:0,win:0},
   currentPrediction:null,
   results:[] // 🔥 สำคัญ
  });

  const el=document.createElement("div");
  el.className="pattern-row";
  el.innerHTML=`
    <div>${code}</div>

   <div id="dots-${id}" style="
  display:grid;
  grid-template-columns:repeat(20,14px);
  gap:2px;
  max-height:32px;
"></div>

    <div id="pct-${id}">0%</div>
    <div class="pred-circle" id="pred-${id}">-</div>
  `;
  box.appendChild(el);
 });

 renderBeadRoad();
}


function recalcAll(){

 // 🔥 reset ก่อน
 patterns.forEach(p=>{
  p.step = 0;
  p.results = [];
  p.stats = {p:0,b:0,t:0,total:0,win:0};
  p.currentPrediction = null;
 });

 // 🔥 LOOP history (อันนี้ห้ามลืมเด็ดขาด)
 history.forEach(r=>{

  patterns.forEach(p=>{

    const expect = p.code[p.step];

    // 🔥 กรณี T → ข้าม
   if(r === "T"){
  p.stats.t++;   // นับเฉยๆ
  return;        // ❗ ไม่ push ไม่ยุ่ง results
}

    const isWin = (r === expect);

    p.results.push(isWin ? 'W' : 'L');

    if(isWin) p.stats.win++;

    if(r==="P") p.stats.p++;
    else if(r==="B") p.stats.b++;

    p.stats.total++;

    // 🔁 เดิน step เฉพาะ P/B
    p.step = (p.step + 1) % p.code.length;

    // 👉 prediction ถัดไป
    p.currentPrediction = p.code[p.step];

  });

 });

}


function addResult(r){
 history.push(r);

 recalcAll();   // 🔥 ต้องเรียกตัวนี้เท่านั้น

 updateUI();
}

function undo(){

 if(history.length === 0) return;

 history.pop();   // ลบตัวล่าสุด

 recalcAll();     // 🔥 คำนวณใหม่ทั้งระบบ
 updateUI();
}

function renderTrick4(){

 const el = document.getElementById("trick4");
 if(!el) return;

 const noTie = history.filter(x => x !== "T");

 if(noTie.length < 8){
   el.innerHTML = "WAIT...";
   return;
 }

 el.innerHTML = "";

 // 🔥 แบ่งเป็นชุดละ 4
 const groups = [];
 for(let i=0;i<noTie.length;i+=4){
   const g = noTie.slice(i,i+4);
   if(g.length === 4){
     groups.push(g);
   }
 }

 // 🔥 ต้องมีอย่างน้อย 2 ชุด
 if(groups.length < 2){
   el.innerHTML = "WAIT...";
   return;
 }

 // 🔥 เทียบทีละคู่
 for(let i=1;i<groups.length;i++){

   const prev = groups[i-1];
   const curr = groups[i];

   let same = 0;
   let diff = 0;

   for(let j=0;j<4;j++){
     if(prev[j] === curr[j]) same++;
     else diff++;
   }
// =========================
// ✅ FINAL LOGIC (ของจริง)
// =========================
let playMode = null;

// ❌ เท่ากัน → ไม่เล่น
if(same === diff){
  playMode = null;
}
else if(same < diff){
  // 👉 เหมือนน้อย → แทงเหมือน
  playMode = "เหมือน";
}
else{
  // 👉 ต่างน้อย → แทงต่าง
  playMode = "ต่าง";
}

  // =========================
  // ✅ สร้างตัวแทง
  // =========================
  let play = [];

  if(playMode === "เหมือน"){
    play = [...curr];
  }else{
    play = curr.map(x => x === "P" ? "B" : "P");
  }

  // =========================
  // ✅ สร้าง UI
  // =========================
  const row = document.createElement("div");
  row.className = "trick-row";

  // 🔥 ⭐ ไฮไลท์บล็อคล่าสุด
  if(i === groups.length - 1){
    row.style.border = "1px solid gold";
    row.style.boxShadow = "0 0 10px gold";
  }



   row.innerHTML = `
     <div class="trick-box">
       ${prev.map(x=>`<div class="trick-cell trick-${x.toLowerCase()}">${x}</div>`).join("")}
     </div>

     <div class="trick-result">
       ${same}ตัวเหมือน / ${diff}ตัวต่าง
     </div>

     <div class="trick-box">
       ${curr.map(x=>`<div class="trick-cell trick-${x.toLowerCase()}">${x}</div>`).join("")}
     </div>

     <div class="trick-box">
<div class="trick-box">
  ${
    playMode === null
    ? `<div style="color:#888">SKIP</div>`
    : play.map(x=>`
        <div class="trick-cell trick-${x.toLowerCase()} ${i === groups.length - 1 ? 'trick-play-glow' : ''}">
          ${x}
        </div>
      `).join("")
  }
</div>

   `;

   el.appendChild(row);
 }
}



function updateUI(){

 const total = history.length;
 const p = history.filter(x=>x==="P").length;
 const b = history.filter(x=>x==="B").length;
 const t = history.filter(x=>x==="T").length;

 document.getElementById("total-p").innerText = p;
 document.getElementById("total-b").innerText = b;
 document.getElementById("total-t").innerText = t;
 document.getElementById("total-all").innerText = total;

renderBeadRoad();

// 🔥 STEP 1: หา % สูงสุด
let maxPct = 0;

patterns.forEach(p=>{
 const pct = p.stats.total
   ? Math.round((p.stats.win/p.stats.total)*100)
   : 0;

 if(pct > maxPct) maxPct = pct;
});

// 🔥 STEP 2: render + ใส่ effect
patterns.forEach(pat=>{

  const pct = pat.stats.total
   ? Math.round((pat.stats.win/pat.stats.total)*100)
   : 0;

  // 👉 ดึงแถว
  const row = document.getElementById(`pct-${pat.id}`).parentElement;

  // 🔥 ล้างก่อน
  row.classList.remove("top-pattern");

  // 🔥 ถ้า % สูงสุด → กระพริบ
  if(pct === maxPct && pct > 0){
    row.classList.add("top-pattern");
  }

  document.getElementById(`pct-${pat.id}`).innerText = pct+"%";

  const predEl = document.getElementById(`pred-${pat.id}`);
  predEl.innerText = pat.currentPrediction || "-";

  const dots = document.getElementById(`dots-${pat.id}`);
  dots.innerHTML = "";

  pat.results.forEach(r=>{
    const d=document.createElement("div");

    d.style.width="14px";
    d.style.height="14px";
    d.style.fontSize="10px";
    d.style.display="flex";
    d.style.alignItems="center";
    d.style.justifyContent="center";
    d.style.borderRadius="3px";


if(r==="W"){
  d.style.background="#ffd700";
  d.style.color="#000";
  d.innerText="✔";

}else if(r==="L"){
  d.style.background="#444";
  d.style.color="#888";
  d.innerText="X";
}

    dots.appendChild(d);
  });

  dots.scrollLeft = dots.scrollWidth;

 });

 // ✅ วางตรงนี้เลย
renderQuickView();
renderTrick4(); // 🔥 เพิ่มบรรทัดนี้

}

function renderQuickView(){

 const box = document.getElementById("quick-view");

 // 🔥 ซ่อน/แสดง
 const boxWrap = box.parentElement;
 if(history.length === 0){
   boxWrap.style.display = "none";
   return;
 }else{
   boxWrap.style.display = "block";
 }

 box.innerHTML = "";

 // 🔥 หา % สูงสุด
 let maxPct = 0;
 patterns.forEach(p=>{
   const pct = p.stats.total
     ? Math.round((p.stats.win/p.stats.total)*100)
     : 0;
   if(pct > maxPct) maxPct = pct;
 });

 // 🔥 sort
 const sorted = [...patterns].sort((a,b)=>{
   const pctA = a.stats.total ? (a.stats.win/a.stats.total) : 0;
   const pctB = b.stats.total ? (b.stats.win/b.stats.total) : 0;
   return pctB - pctA;
 });

 const top6 = sorted.slice(0,6);

 top6.forEach(p=>{
   const pct = p.stats.total
     ? Math.round((p.stats.win/p.stats.total)*100)
     : 0;

   const div = document.createElement("div");
   div.className = "quick-item";

   // 🔥 กระพริบตัว Top
   if(pct === maxPct && pct > 0){
     div.classList.add("quick-top");
   }

   let colorClass = "";
   if(p.currentPrediction === "P") colorClass = "quick-p";
   else if(p.currentPrediction === "B") colorClass = "quick-b";
   else colorClass = "quick-t";

   div.innerHTML = `
     <div class="quick-left">
       <div class="quick-pred ${colorClass}">
         ${p.currentPrediction || "-"}
       </div>
       <div class="quick-code">${p.code}</div>
     </div>

     <div class="quick-pct">${pct}%</div>
   `;

   box.appendChild(div);
 });
}



function clearData(){

 if(!confirm("ล้างข้อมูลทั้งหมด?")) return;

 history = [];

 recalcAll();
 updateUI();
}

function renderBeadRoad(){
  const grid = document.getElementById("bead-grid");
  grid.innerHTML = "";

  const rows = 6;

  // 🔥 จำนวนคอลัมน์ = จำนวนข้อมูล / 6
  const cols = Math.ceil(history.length / rows) || 1;

  grid.style.gridTemplateRows = `repeat(${rows}, 40px)`;
  grid.style.gridAutoFlow = "column"; // 🔥 สำคัญมาก
  grid.style.gridTemplateColumns = `repeat(${cols}, 40px)`;

  // เติมช่องว่างทั้งหมด
  for(let i = 0; i < rows * cols; i++){

    const d = document.createElement("div");
    d.className = "bead";

    if(i < history.length){

      const v = history[i];

      if(v === "P") d.classList.add("b-p");
      if(v === "B") d.classList.add("b-b");
      if(v === "T") d.classList.add("b-t");

      d.innerText = v;

    } else {
      d.classList.add("b-empty");
    }

    grid.appendChild(d);
  }
}

init();
updateUI();


</script>
